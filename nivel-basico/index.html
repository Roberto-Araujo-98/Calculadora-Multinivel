<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Rok - Básico</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="estilos.css">
</head>
<body class="bg-gradient-to-br from-slate-950 via-black to-slate-900 min-h-screen flex items-center justify-center p-4">

   <div id="calc-card" class="w-full max-w-[490px] bg-slate-900/90 rounded-2xl p-5 border border-blue-500/30 shadow-[0_0_30px_rgba(30,58,138,0.4)] transition-all">
    <!-- Busca tu contenedor principal y asegúrate de que tenga este id -->
 
        <!-- Barra de Navegación Modular (Cyberpunk Pills) -->
       <nav class="flex justify-around bg-black/50 rounded-xl p-1.5 mb-5 border border-slate-800">
    <a href="../" class="text-slate-400 hover:text-blue-400 text-xs md:text-sm font-medium px-3 py-1.5 rounded-lg transition-all">Inicio</a>
    
    <!-- 🔥 Básico Activo con el ID -->
    <a href="#" id="nav-active-pill" class="bg-blue-600 text-white text-xs md:text-sm font-semibold px-4 py-1.5 rounded-lg shadow-[0_0_10px_rgba(37,99,235,0.5)]">Básico</a>
    
    <a href="../nivel-avanzado/" class="text-slate-400 hover:text-blue-400 text-xs md:text-sm font-medium px-3 py-1.5 rounded-lg transition-all">Avanzado</a>
    <a href="../nivel-cientifico/" class="text-slate-500 text-xs md:text-sm font-medium px-3 py-1.5 rounded-lg cursor-not-allowed">Científico</a>
</nav>

        <!-- Pantalla de Visualización de Alto Contraste -->
        <div class="bg-black/80 rounded-xl p-4 mb-4 border border-slate-800 shadow-[inset_0_2px_10px_rgba(0,0,0,0.9)] text-right overflow-hidden">
            <div id="history" class="text-blue-500/70 text-xs h-5 font-mono tracking-wide"></div>
            <div id="display" class="text-blue-400 text-3xl font-light font-mono tracking-tight truncate mt-1">0</div>
        </div>

        <!-- Rejilla Aritmética de 4 Columnas Simétricas -->
        <div class="grid grid-cols-4 gap-2 auto-rows-[52px] md:auto-rows-[58px]">
            <!-- Fila 1 -->
            <button class="btn text-rose-400 bg-rose-950/20 border border-rose-900/50 hover:bg-rose-900/40 rounded-lg text-sm font-semibold transition-all" data-key="C">C</button>
            <button class="btn text-amber-400 bg-amber-950/20 border border-amber-900/50 hover:bg-amber-900/40 rounded-lg text-sm transition-all" data-key="Backspace">⌫</button>
            <button class="btn text-blue-400 bg-slate-800/60 border border-slate-700/50 hover:bg-blue-950/40 rounded-lg text-lg transition-all" data-key="/">÷</button>
            <button class="btn text-blue-400 bg-slate-800/60 border border-slate-700/50 hover:bg-blue-950/40 rounded-lg text-lg transition-all" data-key="*">×</button>

            <!-- Fila 2 -->
            <button class="btn num text-white bg-slate-800 hover:bg-slate-700 border border-slate-700/40 rounded-lg text-lg font-semibold transition-all" data-key="7">7</button>
            <button class="btn num text-white bg-slate-800 hover:bg-slate-700 border border-slate-700/40 rounded-lg text-lg font-semibold transition-all" data-key="8">8</button>
            <button class="btn num text-white bg-slate-800 hover:bg-slate-700 border border-slate-700/40 rounded-lg text-lg font-semibold transition-all" data-key="9">9</button>
            <button class="btn text-blue-400 bg-slate-800/60 border border-slate-700/50 hover:bg-blue-950/40 rounded-lg text-lg transition-all" data-key="-">−</button>

            <!-- Fila 3 -->
            <button class="btn num text-white bg-slate-800 hover:bg-slate-700 border border-slate-700/40 rounded-lg text-lg font-semibold transition-all" data-key="4">4</button>
            <button class="btn num text-white bg-slate-800 hover:bg-slate-700 border border-slate-700/40 rounded-lg text-lg font-semibold transition-all" data-key="5">5</button>
            <button class="btn num text-white bg-slate-800 hover:bg-slate-700 border border-slate-700/40 rounded-lg text-lg font-semibold transition-all" data-key="6">6</button>
            <button class="btn text-blue-400 bg-slate-800/60 border border-slate-700/50 hover:bg-blue-950/40 rounded-lg text-lg transition-all" data-key="+">+</button>

            <!-- Fila 4 -->
            <button class="btn num text-white bg-slate-800 hover:bg-slate-700 border border-slate-700/40 rounded-lg text-lg font-semibold transition-all" data-key="1">1</button>
            <button class="btn num text-white bg-slate-800 hover:bg-slate-700 border border-slate-700/40 rounded-lg text-lg font-semibold transition-all" data-key="2">2</button>
            <button class="btn num text-white bg-slate-800 hover:bg-slate-700 border border-slate-700/40 rounded-lg text-lg font-semibold transition-all" data-key="3">3</button>
            <button class="btn equal text-emerald-400 bg-emerald-950/30 border border-emerald-500/40 hover:bg-emerald-500 hover:text-black rounded-lg text-xl font-bold shadow-[0_0_15px_rgba(16,185,129,0.1)] transition-all" data-key="Enter">=</button>

            <!-- Fila 5 (Aquí se usa el span de Tailwind para acoplar el 0 y asegurar la celda del Fox) -->
            <button class="btn num col-span-2 text-white bg-slate-800 hover:bg-slate-700 border border-slate-700/40 rounded-lg text-lg font-semibold transition-all" data-key="0">0</button>
            <button class="btn text-slate-300 bg-slate-800/40 border border-slate-700/50 hover:bg-slate-750 rounded-lg text-lg transition-all" data-key=".">.</button>
            <div class="bg-black/40 border border-slate-800 rounded-lg overflow-hidden p-0.5 flex items-center justify-center">
                <img src="fox.jpg" alt="Senko" class="w-full h-full object-cover rounded-md">
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
